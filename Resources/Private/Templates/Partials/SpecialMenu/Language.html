<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

    <f:if condition="{languagemenu} == 1">   
    	   <f:then>  
		    <li class="order-{languagemenuPos} {topElementWrap}">
			    	<a  href="#" class="languagemode d-inline-flex align-items-center py-3" data-show-sub="false" title="Languages">
			         <span class="symbol">Language</span><span class="{showtitle}"><f:translate key="LLL:EXT:t13sitepackage/Resources/Private/Language/locallang_frontend.xlf:language_select" /></span>
			    </a>
	            <div class="tab-content">
	                <div class="tab-pane fade popover languagemenu" id="tab-languagemode-mobile">
	                    <f:for each="{menuLanguage}" as="item">
	                        <f:variable name="languageTitle">
	                            <f:format.case mode="capital">{item.title}</f:format.case>
	                        </f:variable>
	                        <span class="d-block {f:if(condition: item.active, then: 'active', else: 'inactive')} {f:if(condition: item.available, else: 'muted')} {topliaclass}">
	                            <f:if condition="{item.available}">
	                                <f:then>
	                                    <a href="{item.link}" hreflang="{item.hreflang}" title="{item.navigationTitle}">
	                                      <span>{languageTitle}</span>
	                                    </a>
	                                </f:then>
	                                <f:else>
	                                    <span class="d-block" title="{item.navigationTitle}">{languageTitle}</span>
	                                </f:else>
	                            </f:if>
	                        </span>
	                    </f:for>
	                    <span class="btn-close" title="close popup"></span>
	                 </div>
		         </div>   
		    </li>
        	</f:then> 
    </f:if>
    
    <f:if condition="{languagemenu} == 2">   
    	   <f:then>  
	    	  <li class="languagemenu order-{languagemenuPos} {topElementWrap}">
	            <f:for each="{menuLanguage}" as="item">
	                <f:variable name="languageTitle">
	                	    <f:format.case mode="capital">{item.twoLetterIsoCode}</f:format.case>
	                </f:variable>
	                <span class="pe-2 {f:if(condition: item.active, then: 'active', else: 'inactive')} {f:if(condition: item.available, else: 'muted')} ">
	                    <f:if condition="{item.available}">
	                        <f:then>
	                            <a class="pe-2 bold uppercase" href="{item.link}" hreflang="{item.hreflang}" title="{item.navigationTitle}">
	                                {languageTitle}
	                            </a>
	                        </f:then>
	                        <f:else>
	                            <span class="uppercase" title="{item.navigationTitle}">{languageTitle}</span>
	                        </f:else>
	                    </f:if>
	                </span>
	            </f:for>
            </li>
    	   </f:then> 
    </f:if>
</html>
