<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true">
     <f:if condition="{BreadcrumbMenu}">
        <nav class="{breadcrumbwrap}">
            <f:if condition="{breadcrumbtext}">
                <span class="breadcrumbnavinf {breadcrumbstart} pe-2"><f:translate key="LLL:EXT:t3up/Resources/Private/Language/locallang_frontend.xlf:here" />:</span>
            </f:if>
            <ol class="{breadcrumbulwrap}">
                <f:cObject typoscriptObjectPath="lib.breadcrumbHome" />
                <f:for each="{BreadcrumbMenu}" as="item">
                    <f:render partial="Menu/Elements/Item" section="normal" arguments="{item: item}"/>
                </f:for>
            </ol>
        </nav>
    </f:if>
</html>
