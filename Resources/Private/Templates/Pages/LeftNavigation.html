 <html xmlns="http://www.w3.org/1999/xhtml" lang="en" xmlns:f="http://typo3.org/ns/fluid/ViewHelpers"> 
	<f:layout name="Standard" />
	<f:section name="Content">
		<f:render partial="Header.html" section="Header" arguments="{_all}" />
		<main id="content" class="leftNavigation">
			<div class="overlay"></div> 
            <f:format.raw>{media}</f:format.raw>
			<div class="container">          
				<div class="row">
					<div class="col-12 col-lg-3 left pe-lg-5">
						<f:if condition="{page.pageRecord.hidenav} != '1'">
							<f:then>
							<!-- beginn: subnavigation #nav -->
								<div class="d-none d-lg-block subnav"> 
									<f:render partial="Submenu/Submenu" arguments="{_all}"/>
								</div>
							<!-- ende: subnavigation #nav -->   
							</f:then>
						</f:if>
						<f:if condition="{left}">
							<!--TYPO3SEARCH_begin-->             
								<f:format.raw>{left}</f:format.raw>
							<!--TYPO3SEARCH_end-->                         
					  </f:if>  
					</div>
                    <div class="col-12 col-lg-8 content px-5 pe-lg-3 ps-lg-5"> 
                     	<f:render partial="SpecialMenu/Breadcrumb" section="content" arguments="{_all}"/>	  
		                <f:if condition="{page.pageRecord.deltitle} != '1'">
		                  <f:if condition="{page.pageRecord.showtitle} == 0">
		                      <f:then>
		                        <f:format.nl2br><h1 class="{h1wrap}">{title}</h1></f:format.nl2br>
		                       </f:then> 
		                      <f:else>
		                          <h1 class="outof">{title}</h1>  
		                       </f:else> 
		                  </f:if>
		                </f:if>
                        <!--TYPO3SEARCH_begin-->
                            <f:format.raw>{content}</f:format.raw>
                         <!--TYPO3SEARCH_end-->  
                         <f:if condition="{page.pageRecord.previousnext}">
                            <f:cObject typoscriptObjectPath="lib.navigation.prevnext" />
                        </f:if>
                    </div>                      
				 </div> 
			</div>  
		</main>
	 </f:section>
</html>
