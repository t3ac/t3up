 <html xmlns="http://www.w3.org/1999/xhtml" lang="en"
     xmlns:f="http://typo3.org/ns/fluid/ViewHelpers">
    <f:layout name="Standard" />
    <f:section name="Content">
        <f:render partial="Header.html" section="list" arguments="{_all}" />
        <main id="content">
            <div class="overlay"></div> 
            <f:format.raw>{media}</f:format.raw>
            <div class="container">  
                <div class="row">
            		<f:render partial="SpecialMenu/Breadcrumb" section="content" arguments="{_all}"/>
	              <f:if condition="{data.deltitle} != '1'">
	                <f:if condition="{data.showtitle} == 0">
	                    <f:then>
	                      <f:format.nl2br><h1 class="col-12">{title}</h1></f:format.nl2br>
	                     </f:then> 
	                    <f:else>
	                     	<h1 class="outof">{title}</h1>  
	                     </f:else> 
	                </f:if>
	              </f:if>
                    <!--TYPO3SEARCH_begin--> 
                        <div class="col-12 col-lg-3 left"><f:format.raw>{left}</f:format.raw></div>
                        <div class="col-12 col-lg-6 content"><f:format.raw>{content}</f:format.raw></div>
                        <div class="col-12 col-lg-3 right"><f:format.raw>{right}</f:format.raw></div>
                    <!--TYPO3SEARCH_end--> 
                </div>
            </div>
                
        </main>
     </f:section>
</html>
