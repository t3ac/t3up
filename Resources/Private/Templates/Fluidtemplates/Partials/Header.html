<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
data-namespace-typo3-fluid="true">

<f:section name="list">	
	<header id="header" class="{dynstyle} " >

		 <f:if condition="{toppos} = 1">
			<f:then>
				<div class="top toparea" role="region"> 
					<div class="container"> 
						<ul id="service_nav" class="list-unstyled nav-service d-flex {showtitle} {topwrap}">
							<f:if condition="{navstyle} == 7">
								<f:cObject typoscriptObjectPath="lib.navigation.simpleburger" />
							</f:if>
							<f:cObject typoscriptObjectPath="lib.header.top" />
							<f:if condition="{menuLanguage}"><f:render partial="SpecialMenu/Language" arguments="{_all}"/></f:if>
						</ul>
					</div>
				</div>
				<div class="{headcontainer}"> 
					<f:cObject typoscriptObjectPath="lib.header.logo" />
					<f:cObject typoscriptObjectPath="lib.header.extra" />
					<f:render section="navi" arguments="{_all}"/>
				</div>
			</f:then>
			<f:else>

				 <div class="{headcontainer}"> 
					<f:cObject typoscriptObjectPath="lib.header.logo" />
					<div class="{headarea}">
						<f:render section="top" arguments="{_all}"/>
						<f:cObject typoscriptObjectPath="lib.header.extra" />
						<f:render section="navi" arguments="{_all}"/>
					</div>	
				</div>
	
			</f:else>
		</f:if>
	</header>
</f:section>


<f:section name="top">
	<ul id="service_nav" class="top list-unstyled nav-service d-flex {showtitle} {topwrap}">
		<f:if condition="{navstyle} == 7">
			<f:cObject typoscriptObjectPath="lib.navigation.simpleburger" />
		</f:if>
		<f:cObject typoscriptObjectPath="lib.header.top" />
		<f:if condition="{menuLanguage}"><f:render partial="SpecialMenu/Language" arguments="{_all}"/></f:if>
	</ul>
</f:section>

<f:section name="navi">
    <f:if condition="{navstyle} == 1">
        <f:render partial="Menu/StandardNavigation" arguments="{_all}"/>
    </f:if>
    <f:if condition="{navstyle} == 2">
        <f:render partial="Menu/ActiveNavigation" arguments="{_all}"/>
    </f:if>
    <f:if condition="{navstyle} == 3">
        <f:render partial="Menu/BlockNavigation" arguments="{_all}"/>
    </f:if>
    <f:if condition="{navstyle} == 4">
        <f:render partial="Menu/SimpleNavigation" arguments="{_all}"/>
    </f:if>
    <f:if condition="{navstyle} == 5">
        <f:render partial="Menu/AnkerNavigation" arguments="{_all}"/>       
    </f:if>
</f:section>

</html>
